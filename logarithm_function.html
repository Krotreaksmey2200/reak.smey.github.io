<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Koh+Santepheap:wght@400;600;700&display=swap" rel="stylesheet">

<script>
window.MathJax = {
  tex: {inlineMath:[['\\(','\\)'],['$', '$']]}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

<style>
body {
    margin: 0;
    font-family: "Koh Santepheap", sans-serif;
    background: #0f172a;
    color: white;
    overflow: hidden;
}

/* Slide container */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 80px;
    box-sizing: border-box;
    display: none;
}

/* Active */
.active {
    display: block;
}

/* Title */
.title {
    font-size: 42px;
    margin-bottom: 40px;
}

.num {
    color: #ff4d4f;
    font-size: 55px;
}

/* Text */
.text {
    font-size: 28px;
    line-height: 2;
    color: #cbd5e1;
}

/* Formula */
.formula {
    background: #1e293b;
    padding: 8px 14px;
    border-radius: 10px;
}

/* Step animation */
.step {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
}

.step.show {
    opacity: 1;
    transform: translateY(0);
}

/* Footer */
.footer {
    position: fixed;
    bottom: 20px;
    right: 30px;
    color: #94a3b8;
}

/* Progress bar */
.progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 5px;
    background: #4f6cff;
    width: 0%;
}
</style>

</head>

<body>

<div class="progress" id="progress"></div>

<!-- Slide 1 -->
<div class="slide active">
<div class="title">
<span class="num">1.</span>
f(x) = <span class="formula">\( x - 2 - \ln x \)</span>
</div>

<div class="text step">មានក្រាប C</div>
</div>

<!-- Slide 2 -->
<div class="slide">
<div class="text step">ក. រកដែនកំណត់នៃអនុគមន៍</div>
<div class="text step">ខ. សិក្សាសញ្ញានៃ f'(x)</div>
<div class="text step">គ. កំណត់អាស៊ីមតូត</div>
</div>

<!-- Slide 3 -->
<div class="slide">
<div class="text step">ឃ. បន្ទាត់ប៉ះនៅ x = 1</div>
<div class="text step">ង. សង់ក្រាប</div>
</div>

<div class="footer">← → / Space</div>

<script>
let slideIndex = 0;
let stepIndex = 0;

const slides = document.querySelectorAll(".slide");
const progress = document.getElementById("progress");

function updateProgress(){
    let percent = ((slideIndex+1)/slides.length)*100;
    progress.style.width = percent + "%";
}

function showSlide(i){
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
    stepIndex = 0;

    let steps = slides[i].querySelectorAll(".step");
    steps.forEach(s => s.classList.remove("show"));

    updateProgress();
}

function next(){
    let steps = slides[slideIndex].querySelectorAll(".step");

    if(stepIndex < steps.length){
        steps[stepIndex].classList.add("show");
        stepIndex++;
    } else if(slideIndex < slides.length - 1){
        slideIndex++;
        showSlide(slideIndex);
    }
}

function prev(){
    if(stepIndex > 0){
        stepIndex--;
        let steps = slides[slideIndex].querySelectorAll(".step");
        steps[stepIndex].classList.remove("show");
    } else if(slideIndex > 0){
        slideIndex--;
        showSlide(slideIndex);
    }
}

/* Keyboard */
document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight" || e.key === " "){
        next();
    }
    if(e.key === "ArrowLeft"){
        prev();
    }
});

/* Init */
showSlide(0);
</script>

</body>
</html>
